# version: "3.9"

services:
  app:
    build: .
    ports:
      - "3001:3000"
    volumes:
      - .:/app:Z                          # Mount source code for live reload
      - node_modules:/app/node_modules     # Persist node_modules in a named volume
    environment:
      NODE_ENV: development
    command: npm run dev

volumes:
  node_modules: